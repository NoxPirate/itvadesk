{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card card-custom">
            <div class="card-header-custom text-center">
                <h3 class="mb-0">Create Support Ticket</h3>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('main.submit_ticket') }}">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Your Name</label>
                        <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-envelope"></i>@</span>
                            <!-- Pre-filling user's requested email as a placeholder or value suggestion -->
                            <input type="email" name="email" class="form-control" placeholder="Enter your email address"
                                required>
                        </div>
                        <div class="form-text">Resolution updates will be sent to this email.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Department</label>
                        <select name="department" class="form-select" required>
                            <option value="">Choose Department...</option>
                            <option>IT</option>
                            <option>HR</option>
                            <option>Accounts</option>
                            <option>Admin</option>
                            <option>Marketing</option>
                            <option>CRM</option>
                            <option>Engineering</option>
                            <option>Procurement</option>
                            <option>Sales</option>
                            <option>Pre-sales</option>
                            <option>Architecture</option>
                            <option>Legal</option>
                            <option>Licensing</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Describe Issue</label>
                        <textarea name="issue" class="form-control" rows="5"
                            placeholder="Please describe your issue in detail..." required></textarea>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary-custom btn-lg">Submit Ticket</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="text-center mt-4">
            <p class="text-muted">Need urgent help? Call IT Support at Ext 1234</p>
        </div>
    </div>
</div>
{% endblock %}
